# .github/workflows/ci.yml
name: CI

on: [push]                       # the trigger

jobs:
  build:
    name: Build stage
    runs-on: ubuntu-latest       # the runner
    steps:
      - name: say hello
        run: echo "Pipeline is running!"
      - name: Build Docker image
        run: docker build -t bem-app:${{ github.sha }} .
  tests:
    needs: build
    name: Test stage
    runs-on: ubuntu-latest
    steps:
      - name: Run tests
        run: echo "Running tests..."